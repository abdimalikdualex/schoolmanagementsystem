{% extends 'main_app/base.html' %}

{% block content %}
<div class="content-wrapper">
    <section class="content-header">
        <div class="container-fluid">
            <div class="row mb-2">
                <div class="col-sm-6">
                    <h1>Student Transcripts</h1>
                </div>
                <div class="col-sm-6">
                    <ol class="breadcrumb float-sm-right">
                        <li class="breadcrumb-item"><a href="{% url 'admin_home' %}">Home</a></li>
                        <li class="breadcrumb-item active">Transcripts</li>
                    </ol>
                </div>
            </div>
        </div>
    </section>

    <section class="content">
        <div class="container-fluid">
            <div class="row justify-content-center">
                <div class="col-lg-10">
                    <div class="card card-primary shadow">
                        <div class="card-header bg-gradient-primary">
                            <h3 class="card-title">
                                <i class="fas fa-file-alt mr-2"></i> Select Student to View/Print Transcript
                            </h3>
                        </div>
                        <div class="card-body">
                            <div class="row">
                                <div class="col-md-10">
                                    <div class="form-group">
                                        <label><strong>Select Student</strong></label>
                                        <select id="student_select" class="form-control form-control-lg">
                                            <option value="">-- Select Student --</option>
                                            {% for student in students %}
                                            <option value="{{ student.id }}">
                                                {{ student.admin.last_name }}, {{ student.admin.first_name }} ({{ student.admin.username }})
                                            </option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button id="view_transcript_btn" class="btn btn-primary btn-block btn-lg">
                                        <i class="fas fa-eye"></i> View
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Transcript Card -->
                    <div class="card card-success shadow" id="transcript_card" style="display: none;">
                        <div class="card-header bg-gradient-success">
                            <h3 class="card-title">
                                <i class="fas fa-graduation-cap mr-2"></i> Student Transcript
                            </h3>
                            <div class="card-tools">
                                <button type="button" class="btn btn-success btn-sm mr-2" onclick="window.print()">
                                    <i class="fas fa-print"></i> Print
                                </button>
                                <button type="button" class="btn btn-secondary btn-sm" onclick="location.reload()">
                                    <i class="fas fa-redo"></i> Clear
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <div id="transcript_content">
                                <!-- Transcript will be loaded here -->
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>

<style>
    @media print {
        .content-wrapper {
            margin: 0;
            padding: 0;
        }
        .card-tools {
            display: none;
        }
        body {
            background: white;
        }
    }
    
    .transcript-header {
        text-align: center;
        margin-bottom: 30px;
        border-bottom: 3px solid #333;
        padding-bottom: 15px;
    }
    
    .transcript-header h2 {
        margin: 0;
        color: #2c3e50;
    }
    
    .student-info {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
        padding: 15px;
        background: #f8f9fa;
        border-radius: 5px;
    }
    
    .student-info-item {
        display: flex;
        justify-content: space-between;
    }
    
    .student-info-label {
        font-weight: bold;
        color: #2c3e50;
    }
    
    .transcript-table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 30px;
    }
    
    .transcript-table thead {
        background: #34495e;
        color: white;
    }
    
    .transcript-table th {
        padding: 12px;
        text-align: left;
        border: 1px solid #bdc3c7;
    }
    
    .transcript-table td {
        padding: 12px;
        border: 1px solid #bdc3c7;
    }
    
    .transcript-table tbody tr:nth-child(even) {
        background: #ecf0f1;
    }
    
    .transcript-table tbody tr:hover {
        background: #e8e8e8;
    }
    
    .text-center {
        text-align: center;
    }
    
    .summary-section {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-top: 30px;
    }
    
    .summary-box {
        padding: 20px;
        background: #ecf0f1;
        border-radius: 5px;
        text-align: center;
        border-left: 4px solid #3498db;
    }
    
    .summary-label {
        font-size: 14px;
        color: #7f8c8d;
        margin-bottom: 5px;
    }
    
    .summary-value {
        font-size: 24px;
        font-weight: bold;
        color: #2c3e50;
    }
    
    .grade-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 3px;
        color: white;
        font-weight: bold;
    }
    
    .grade-a { background: #27ae60; }
    .grade-b { background: #3498db; }
    .grade-c { background: #f39c12; }
    .grade-d { background: #e74c3c; }
    .grade-f { background: #c0392b; }
</style>

<script>
    document.getElementById('view_transcript_btn').addEventListener('click', function() {
        var student_id = document.getElementById('student_select').value;
        
        if (!student_id) {
            alert('Please select a student');
            return;
        }
        
        var formData = new FormData();
        formData.append('student_id', student_id);
        formData.append('csrfmiddlewaretoken', getCookie('csrftoken'));
        
        fetch("{% url 'admin_get_student_transcript' %}", {
            method: 'POST',
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.error) {
                alert('Error: ' + data.error);
                return;
            }
            
            var transcriptHTML = `
                <div class="transcript-header">
                    <h2>ELEVATE COLLEGE PORTAL</h2>
                    <p style="margin: 5px 0;">Academic Transcript</p>
                </div>
                
                <div class="student-info">
                    <div class="student-info-item">
                        <span class="student-info-label">Student Name:</span>
                        <span>${data.student_name}</span>
                    </div>
                    <div class="student-info-item">
                        <span class="student-info-label">Student ID:</span>
                        <span>${data.student_id}</span>
                    </div>
                    <div class="student-info-item">
                        <span class="student-info-label">Course:</span>
                        <span>${data.course}</span>
                    </div>
                    <div class="student-info-item">
                        <span class="student-info-label">Session:</span>
                        <span>${data.session}</span>
                    </div>
                </div>
                
                <table class="transcript-table">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Subject</th>
                            <th class="text-center">Test (40)</th>
                            <th class="text-center">Exam (60)</th>
                            <th class="text-center">Total (100)</th>
                            <th class="text-center">Grade</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            data.results.forEach(function(result, index) {
                transcriptHTML += `
                    <tr>
                        <td>${index + 1}</td>
                        <td>${result.subject}</td>
                        <td class="text-center">${result.test}</td>
                        <td class="text-center">${result.exam}</td>
                        <td class="text-center"><strong>${result.total}</strong></td>
                        <td class="text-center">${result.grade}</td>
                    </tr>
                `;
            });
            
            transcriptHTML += `
                    </tbody>
                </table>
                
                <div class="summary-section">
                    <div class="summary-box">
                        <div class="summary-label">Average Score</div>
                        <div class="summary-value">${data.average}</div>
                    </div>
                    <div class="summary-box">
                        <div class="summary-label">Total Subjects</div>
                        <div class="summary-value">${data.results.length}</div>
                    </div>
                </div>
                
                <div style="margin-top: 40px; text-align: center; color: #7f8c8d; font-size: 12px;">
                    <p>This is an official academic transcript. Grade Scale: A (70-100), B (60-69), C (50-59), D (40-49), F (0-39)</p>
                    <p>Generated on ${new Date().toLocaleDateString()} at ${new Date().toLocaleTimeString()}</p>
                </div>
            `;
            
            document.getElementById('transcript_content').innerHTML = transcriptHTML;
            document.getElementById('transcript_card').style.display = 'block';
        })
        .catch(error => {
            console.error('Error:', error);
            alert('Error loading transcript');
        });
    });
    
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
</script>

{% endblock %}
