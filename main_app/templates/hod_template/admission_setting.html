{% extends 'main_app/base.html' %}
{% load static %}
{% block page_title %}{{page_title}}{% endblock page_title %}

{% block content %}
<section class="content">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title">Admission Number Settings</h3>
                    </div>
                    <div class="card-body">
                        <form method="post">
                            {% csrf_token %}
                            <div class="form-group">
                                <label>Prefix</label>
                                <input type="text" name="prefix" class="form-control" value="{{ setting.prefix if setting else 'ADM' }}">
                            </div>
                            <div class="form-group">
                                <label>Start Number</label>
                                <input type="number" name="start_number" class="form-control" value="{{ setting.start_number if setting else 1000 }}">
                            </div>
                            <button class="btn btn-primary">Save</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock content %}
